stages:
  - module-pipelines

frontend:
  stage: module-pipelines
  trigger:
    include:
      - "/frontend/.gitlab-ci.yml"
    strategy: depend
  only:
    changes:
      - frontend/**/*

backend:
  stage: module-pipelines
  trigger:
    include:
      - "/backend/.gitlab-ci.yml"
    strategy: depend
  only:
    changes:
      - backend/**/*

cluster:
  stage: module-pipelines
  trigger:
    include:
      - "/infra/cluster/.gitlab-ci.yml"
    strategy: depend
  only:
    changes:
      - infra/cluster/**/*

kuber:
  stage: module-pipelines
  trigger:
    include:
      - "/infra/ingress/.gitlab-ci.yml"
    strategy: depend
  when: manual