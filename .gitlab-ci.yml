stages:
  - module-pipelines

frontend:
  stage: module-pipelines
  trigger:
    include:
      - "/frontend/.gitlab-ci.yml"
    strategy: depend
  only:
    changes:
      - frontend/**/*

backend:
  stage: module-pipelines
  trigger:
    include:
      - "/backend/.gitlab-ci.yml"
    strategy: depend
  only:
    changes:
      - backend/**/*

cluster:
  stage: module-pipelines
  trigger:
    include:
      - "/infra/cluster/.gitlab-ci.yml"
    strategy: depend
  only:
    changes:
      - infra/cluster/**/*

ingress:
  stage: module-pipelines
  trigger:
    include:
      - "/infra/ingress/.gitlab-ci.yml"
    strategy: depend
  when: manual

cert:
  stage: module-pipelines
  trigger:
    include:
      - "/infra/cert-manager/.gitlab-ci.yml"
    strategy: depend
  when: manual

monitoring:
  stage: module-pipelines
  trigger:
    include:
      - "/infra/monitoring/grafana/.gitlab-ci.yml"
      - "/infra/monitoring/loki-stack/.gitlab-ci.yml"
      - "/infra/monitoring/kube-prometheus-stack/.gitlab-ci.yml"
    strategy: depend
  when: manual

token:
  stage: module-pipelines
  trigger:
    include:
      - "/infra/token/.gitlab-ci.yml"
    strategy: depend
  only:
    changes:
      - infra/token/**/*
