variables:
  VERSION: 1.0.${CI_PIPELINE_ID}

stages:
  - test
  - build
  - release
  - chart-upload
  - chart-apply

test:
  stage: test
  image:
    name: golang:1.23-alpine3.22
  cache:
    key: go-mod-cache
    paths:
      - backend/go/pkg/mod
      - backend/.cache/go-build
  before_script:
    - cd backend
    - go env -w GOCACHE=${CI_PROJECT_DIR}/backend/.cache/go-build
    - go env -w GOMODCACHE=${CI_PROJECT_DIR}/backend/go/pkg/mod
    - go mod download
  script:
    - go vet ./cmd/... && go vet ./internal/...
    - go test -v ./...

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.9.0-debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/backend"
      --dockerfile "${CI_PROJECT_DIR}/backend/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/momo-backend:$CI_COMMIT_SHA"
      --build-arg VERSION=$VERSION
      --cache=true
      --cache-repo="${CI_REGISTRY_IMAGE}/cache"

release:
  variables:
    GIT_STRATEGY: none
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [ "" ]
  cache: [ ]
  stage: release
  before_script:
    - crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - crane tag $CI_REGISTRY_IMAGE/momo-backend:$CI_COMMIT_SHA $VERSION

chart-upload:
  stage: chart-upload
  image:
    name: alpine/helm:3.20.2
  before_script:
    - apk add --no-cache curl gettext
  script:
    - envsubst < ${CI_PROJECT_DIR}/backend/backend-chart/Chart.yaml.template > ${CI_PROJECT_DIR}/backend/backend-chart/Chart.yaml && rm ${CI_PROJECT_DIR}/backend/backend-chart/Chart.yaml.template
    - helm lint ${CI_PROJECT_DIR}/backend/backend-chart
    - helm package ${CI_PROJECT_DIR}/backend/backend-chart
    - curl -u $NEXUS_REPO_USER:$NEXUS_REPO_PASS "${NEXUS_REPO_URL}/repository/${NEXUS_REPO_NAME}/" --upload-file backend-${VERSION}.tgz

chart-apply:
  stage: chart-apply
  image:
    name: alpine/helm:3.20.2
  before_script:
    - mkdir -p ~/.kube
    - echo -n $KUBE_CONFIG_B64 | base64 -d > ~/.kube/config
  script:
    - helm repo add ${NEXUS_REPO_NAME} ${NEXUS_REPO_URL}/repository/${NEXUS_REPO_NAME}/ --username $NEXUS_REPO_USER --password $NEXUS_REPO_PASS
    - helm repo update
    - helm upgrade --install backend ${NEXUS_REPO_NAME}/backend --set dockerConfig=$DOCKER_CONFIG_B64 --set image=$CI_REGISTRY_IMAGE/momo-backend:$VERSION --atomic --timeout 15m --version $VERSION
  after_script:
    - rm -f ~/.kube/config