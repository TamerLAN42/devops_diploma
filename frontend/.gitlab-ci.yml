variables:
  VERSION: 1.0.${CI_PIPELINE_ID}

stages:
  - build
  - release
  - chart-upload

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.9.0-debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}/frontend"
      --dockerfile "${CI_PROJECT_DIR}/frontend/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}/momo-frontend:$CI_COMMIT_SHA"
      --build-arg VERSION=$VERSION
      --cache=true
      --cache-repo="${CI_REGISTRY_IMAGE}/cache"

release:
  variables:
    GIT_STRATEGY: none
  image:
    name: gcr.io/go-containerregistry/crane:debug
    entrypoint: [ "" ]
  cache: [ ]
  stage: release
  before_script:
    - crane auth login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - crane tag $CI_REGISTRY_IMAGE/momo-frontend:$CI_COMMIT_SHA $VERSION

chart-upload:
  stage: chart-upload
  image:
    name: alpine/helm:3.20.2
  before_script:
    - apk add --no-cache curl gettext
  script:
    - envsubst < ${CI_PROJECT_DIR}/frontend/frontend-chart/Chart.yaml.template > ${CI_PROJECT_DIR}/frontend/frontend-chart/Chart.yaml && rm ${CI_PROJECT_DIR}/frontend/frontend-chart/Chart.yaml.template
    - helm lint ${CI_PROJECT_DIR}/frontend/frontend-chart
    - helm package ${CI_PROJECT_DIR}/frontend/frontend-chart
    - curl -u $NEXUS_REPO_USER:$NEXUS_REPO_PASS -X POST "${NEXUS_REPO_URL}/repository/tamerlan-outlet-project/" -F "file=@frontend-${VERSION}.tgz"