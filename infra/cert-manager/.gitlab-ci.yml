stages:
  - install
  
cert-manager-install:
  stage: install
  image:
    name: alpine/helm:3.20.2
  before_script:
    - mkdir -p ~/.kube
    - echo -n $ADMIN_KUBECONFIG_B64 | base64 -d > ~/.kube/config
  script:
    - curl -LO https://cert-manager.io/public-keys/cert-manager-keyring-2021-09-20-1020CF3C033D4F35BAE1C19E1226061C665DF13E.gpg
    - helm upgrade --install cert-manager oci://quay.io/jetstack/charts/cert-manager --version v1.20.2 --namespace cert-manager --create-namespace --verify --keyring ./cert-manager-keyring-2021-09-20-1020CF3C033D4F35BAE1C19E1226061C665DF13E.gpg --set crds.enabled=true
  after_script:
    - rm -f ~/.kube/config